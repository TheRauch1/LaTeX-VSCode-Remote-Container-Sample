name: Build PDF

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build PDF with latexmk
        uses: xu-cheng/latex-action@v4
        with:
          root_file: t.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -halt-on-error -outdir=PDF

      - name: Clean auxiliary files
        uses: xu-cheng/latex-action@v4
        with:
          root_file: t.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          args: -c -outdir=PDF

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v6
        with:
          name: t-pdf
          path: PDF/t.pdf
          if-no-files-found: error

      - name: Set release timestamp
        if: github.event_name == 'push'
        id: release_time
        run: echo "timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Create release and upload PDF
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ steps.release_time.outputs.timestamp }}
          name: Build ${{ steps.release_time.outputs.timestamp }}
          files: PDF/t.pdf